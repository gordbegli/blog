<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <meta name="description" content="About page for Gabriel's blog.">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/pandoc.css">
    <style>
        .intro {
            margin: 0 auto;
            max-width: 40rem;
            min-height: calc(100vh - 20rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }

        .intro p {
            margin: 0.65rem 0;
        }

        .gallery-anchor {
            margin-top: calc(20rem + 2vh);
        }

        .media-gallery {
            column-width: 280px;
            column-gap: 1.5rem;
        }

        .media-item {
            margin: 0 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            break-inside: avoid;
        }

        .media-item img,
        .media-item video {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .media-item figcaption {
            font-size: 0.9rem;
            color: #7a5f54;
        }
    </style>
</head>

<body>
    <a href="/index.html" class="nav-link">Home</a>
    <div id="content-wrap">
        <div class="intro">
            <p>Dear Reader,</p>
            <p>Welcome to my homepage on the internet. If you would like to reach out my email is ggordbegli@gmail.com.</p>
            <p>Enjoy your stay,<br>Gabe</p>
        </div>
    </div>
</body>

</html>
